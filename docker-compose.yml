version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════
  # SQL Server Database
  # ═══════════════════════════════════════════════════════════════
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shopsphere-db
    environment:
      SA_PASSWORD: "YourStrong@Password123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong@Password123" -Q "SELECT 1" || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - shopsphere-network

  # ═══════════════════════════════════════════════════════════════
  # Redis Cache
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: shopsphere-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - shopsphere-network

  # ═══════════════════════════════════════════════════════════════
  # Backend API
  # ═══════════════════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: src/ShopSphere.Api/Dockerfile
    container_name: shopsphere-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ShopSphere;User=sa;Password=YourStrong@Password123;TrustServerCertificate=True;Encrypt=False
      - ConnectionStrings__Redis=redis:6379
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - OpenAI__Model=gpt-4o-mini
      - Stripe__SecretKey=${STRIPE_SECRET_KEY}
      - Stripe__PublishableKey=${STRIPE_PUBLISHABLE_KEY}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=ShopSphere
      - Jwt__Audience=ShopSphere.Client
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shopsphere-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # Frontend React App
  # ═══════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: shopsphere-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - shopsphere-network
    restart: unless-stopped

# ═══════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════
volumes:
  sqlserver_data:
  redis_data:
  uploads_data:

# ═══════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════
networks:
  shopsphere-network:
    driver: bridge